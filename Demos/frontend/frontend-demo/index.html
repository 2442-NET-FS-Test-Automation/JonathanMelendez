<!DOCTYPE html>
<html lang="en">
<head> <!-- --> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Catalog</title>
</head>
<body>
    <header class="site-header">
        <h1 id="head-title">City Library</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Sign In</a>
        </nav>
    </header>

    <main>
        <section id="catalog"><h2>Catalog</h2></section>
        <div class="toolbar">
            <label for="search">Search:</label>
            <input type="search" name="search" id="search" placeholder="title or SKU">
            <span class="hint">try a SKU like BKU-101</span>
        </div>
        <div class="cards" id="catalog-cards">
            <article class="card">
                <h3>Clean Code</h3>
                <dl>
                    <dt>SKU</dt><dd>BK-001</dd>
                    <dt>Price</dt><dd>9.99</dd>
                    <dt>In Stock</dt><dd>12</dd>
                </dl>
            </article>
        </div>
    </main>
    
    <footer class=""site-footer>
        <p>City Library - fe demo</p>
    </footer>
</body>
</html>
